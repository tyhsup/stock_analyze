version: 2
project_name: cnyes-cli-pp-cli
changelog:
  disable: true
builds:
  - id: cnyes-cli-pp-cli
    main: ./cmd/cnyes-cli-pp-cli
    binary: cnyes-cli-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X cnyes-cli-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: cnyes-cli-pp-mcp
    main: ./cmd/cnyes-cli-pp-mcp
    binary: cnyes-cli-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: cnyes-cli-pp-cli
    repository:
      owner: ting-yu-hsu
      name: homebrew-tap
    homepage: "https://github.com/ting-yu-hsu/cnyes-cli-pp-cli"
    description: "非官方的鉅亨網新聞列表 API。"
    install: |
      bin.install "cnyes-cli-pp-cli"
      bin.install "cnyes-cli-pp-mcp"
