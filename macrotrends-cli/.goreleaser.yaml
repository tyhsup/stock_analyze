version: 2
project_name: macrotrends-pp-cli
changelog:
  disable: true
builds:
  - id: macrotrends-pp-cli
    main: ./cmd/macrotrends-pp-cli
    binary: macrotrends-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X macrotrends-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: macrotrends-pp-mcp
    main: ./cmd/macrotrends-pp-mcp
    binary: macrotrends-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: macrotrends-pp-cli
    repository:
      owner: ting-yu-hsu
      name: homebrew-tap
    homepage: "https://github.com/ting-yu-hsu/macrotrends-pp-cli"
    description: "提供美股損益表、資產負債表、現金流量表及財務比率數據的 API，整合本地 MySQL 快取與..."
    install: |
      bin.install "macrotrends-pp-cli"
      bin.install "macrotrends-pp-mcp"
